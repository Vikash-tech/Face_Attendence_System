{% extends "base.html" %}

{% block content %}


<div class="row justify-content-center">
<div class="col-md-8">

<div class="card">

<div class="card-header bg-white">
<h4 class="mb-0">
<i class="fas fa-camera"></i> Update Employee Photo
</h4>
</div>

<div class="card-body">

<div class="row">

<!-- LEFT SIDE -->
<div class="col-md-6">

<div class="mb-3">

<label class="form-label">
<i class="fas fa-id-card"></i> Employee ID
</label>

<div class="input-group">

<input type="number"
class="form-control"
id="emp_code"
placeholder="Enter employee ID"
value="{{ emp_code if emp_code else '' }}">

<button class="btn btn-primary" id="captureBtn">
<i class="fas fa-camera"></i>
</button>

</div>

</div>


<div class="mt-3 text-center">

<button id="updateBtn"
class="btn btn-success"
disabled>

<i class="fas fa-upload"></i> Update

</button>

</div>


<!-- Loader -->
<div id="loader"
style="display:none"
class="text-center mt-3">

<div class="spinner-border text-primary"></div>
<p class="mt-2">Updating photo please wait...</p>

</div>


<div class="mt-3 text-center">
<div id="resultMessage"
class="alert"
style="display:none"></div>
</div>

</div>


<!-- CAMERA SIDE -->
<div class="col-md-6">

<div class="camera-container">

<video id="camera-feed"
autoplay
playsinline></video>

<div class="face-guide"></div>

<canvas id="photo-canvas"
style="display:none"></canvas>

</div>


<div id="cameraStatus"
class="mt-2 text-center">

<span class="badge bg-warning">
<i class="fas fa-spinner fa-spin"></i>
Initializing camera...
</span>

</div>


<div class="mt-3 text-center">

<img id="preview"
style="display:none;width:200px;border-radius:10px">

</div>

</div>

</div>

</div>

</div>

</div>
</div>



<script>

const video = document.getElementById("camera-feed");
const canvas = document.getElementById("photo-canvas");
const preview = document.getElementById("preview");
const captureBtn = document.getElementById("captureBtn");
const updateBtn = document.getElementById("updateBtn");
const resultMessage = document.getElementById("resultMessage");
const loader = document.getElementById("loader");
const cameraStatus = document.getElementById("cameraStatus");

let stream=null;


/* START CAMERA */

async function startCamera(){

try{

stream = await navigator.mediaDevices.getUserMedia({
video:true
});

video.srcObject = stream;

video.onloadedmetadata = () => {

cameraStatus.innerHTML = `
<span class="badge bg-success">
<i class="fas fa-check"></i> Camera Ready
</span>`;

};

}catch(err){

cameraStatus.innerHTML = `
<span class="badge bg-danger">
Camera Error
</span>`;

}

}

startCamera();


/* CAPTURE PHOTO */

captureBtn.onclick = () => {

if(!video.videoWidth){

alert("Camera not ready");
return;

}

const ctx = canvas.getContext("2d");

canvas.width = video.videoWidth;
canvas.height = video.videoHeight;

ctx.drawImage(video,0,0);

const img = canvas.toDataURL("image/jpeg");

preview.src = img;
preview.style.display="block";

updateBtn.disabled=false;

};



/* UPDATE PHOTO */

updateBtn.onclick = () => {

const emp_code = document.getElementById("emp_code").value;

if(!emp_code){

alert("Please enter Employee ID");
return;

}

if(!preview.src){

alert("Please capture photo first");
return;

}

const photo_data = preview.src;

loader.style.display="block";
resultMessage.style.display="none";


fetch(apiUrl("/update-employee"),{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
emp_code:emp_code,
photo_data:photo_data
})

})

.then(res=>res.json())

.then(data=>{

loader.style.display="none";

resultMessage.style.display="block";

if(data.success){

resultMessage.className="alert alert-success";
resultMessage.innerHTML="Photo Updated Successfully";

}
else{

resultMessage.className="alert alert-danger";
resultMessage.innerHTML=data.message;

}

})

.catch(err=>{

loader.style.display="none";

resultMessage.style.display="block";

resultMessage.className="alert alert-danger";

resultMessage.innerHTML="Server Error";

});

};



/* STOP CAMERA ON PAGE EXIT */

window.addEventListener("beforeunload",function(){

if(stream){
stream.getTracks().forEach(track=>track.stop());
}

});

</script>

{% endblock %}
