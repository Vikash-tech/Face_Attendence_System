{% extends "base.html" %}

{% block content %}

<script defer src="https://cdn.jsdelivr.net/npm/face-api.js"></script>
<style>
    .switch {
  position: relative;
  display: inline-block;
  width: 42px;
  height: 22px;
}

.switch input {
  opacity: 0;
  width: 0;
  height: 0;
}

.slider {
  position: absolute;
  cursor: pointer;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background-color: #ffc107;
  transition: .4s;
}

.slider:before {
  position: absolute;
  content: "";
  height: 16px;
  width: 16px;
  left: 3px;
  bottom: 3px;
  background-color: white;
  transition: .4s;
}

input:checked + .slider {
  background-color: #1cc88a;
}

input:checked + .slider:before {
  transform: translateX(20px);
}

.slider.round {
  border-radius: 22px;
}

.slider.round:before {
  border-radius: 50%;
}
</style>

<div class="row justify-content-center">

<div class="col-md-8">

<div class="card shadow">

<div class="card-header bg-white">
<h4 class="mb-0">
<i class="fas fa-check-circle text-success"></i>
Mark Attendance
</h4>
</div>

<div class="card-body">

<div class="row">

<!-- LEFT SIDE -->
<div class="col-md-6">

<div class="mb-3">

<label class="form-label">
<i class="fas fa-id-card"></i>
Employee ID
</label>

<div class="input-group">

<input type="text"
class="form-control"
id="emp_code"
name="emp_code"
placeholder="Enter employee ID"
value="{{ request.args.get('emp_code','') }}">

</div>


<div class="d-flex justify-content-end">
    <button class="btn btn-success small-btn"
    type="button"
    id="markBtn">
        Mark
        <i class="fas fa-camera ms-1"></i>
    </button>
</div>

<!-- OUT DUTY -->
<div class="text-start mb-3">
<input type="hidden" id="outduty" value="0">
<label class="switch">
  <input type="checkbox" id="dutyToggle" onchange="OnDutyOnOff()">
  <span class="slider round"></span>
</label>
<span id="dutyText" class="ms-2">OutDuty OFF</span>
</div>

</div>





<!-- EMPLOYEE INFO -->
<div id="employeeInfo" style="display:none">

<div class="card bg-light employee-card">

<div class="card-body">

<h5>
<i class="fas fa-user"></i>
<span id="empName"></span>
</h5>

<p class="mb-1">
<strong>Status:</strong>
<span id="empStatus"></span>
</p>

<p class="mb-1">
<strong>Last Action:</strong>
<span id="lastAction"></span>
</p>

<p class="mb-0">
<strong>Today Hours:</strong>
<span id="todayHours">0h 0m</span>
</p>

</div>
</div>
</div>

</div>



<!-- RIGHT SIDE -->
<div class="col-md-6">

<div class="camera-container">

<video id="camera-feed" autoplay playsinline></video>

<div class="camera-overlay"></div>

<div class="face-guide"></div>

<canvas id="photo-canvas" style="display:none"></canvas>

</div>


<!-- CAMERA STATUS -->
<div id="cameraStatus" class="mt-2 text-center">

<span class="badge bg-warning">

<i class="fas fa-spinner fa-spin"></i>
Initializing camera...

</span>

</div>


<!-- RESULT MESSAGE -->
<div class="mt-3 text-center">

<div id="resultMessage"
class="alert"
style="display:none">

</div>

</div>

</div>

</div>

</div>

</div>

</div>

</div>


<script>

/* ========= YOUR ORIGINAL JS ========= */

const video = document.getElementById('camera-feed');
const canvas = document.getElementById('photo-canvas');
const empCode = document.getElementById('emp_code');
const markBtn = document.getElementById('markBtn');
const cameraStatus = document.getElementById('cameraStatus');
const resultMessage = document.getElementById('resultMessage');
const employeeInfo = document.getElementById('employeeInfo');

    let stream = null;


/* VOICE */
function speak(text){

const speech = new SpeechSynthesisUtterance(text);
speech.lang="en-US";
speech.rate=1;
speech.pitch=1;

window.speechSynthesis.speak(speech);

}


/* CAMERA */
async function initCamera(){

try{

stream = await navigator.mediaDevices.getUserMedia({

video:{
width:640,
height:480,
facingMode:'user'
}

});

video.srcObject=stream;

cameraStatus.innerHTML=
'<span class="badge bg-success"><i class="fas fa-check"></i> Camera Ready</span>';

}catch(err){

cameraStatus.innerHTML=
'<span class="badge bg-danger"><i class="fas fa-exclamation"></i> Camera Not Available</span>';

}

}


/* OUT DUTY TOGGLE */

function OnDutyOnOff(){

    var toggle = document.getElementById("dutyToggle");
    var dutyValue = document.getElementById("outduty");
    var text = document.getElementById("dutyText");

    if (toggle.checked) {

        dutyValue.value = 1;

        alert("OutDuty ON");
        speak("OutDuty On");

        text.innerHTML = "OutDuty ON";

    } 
    else {

        dutyValue.value = 0;

        alert("OutDuty OFF");
        speak("OutDuty Off");

        text.innerHTML = "OutDuty OFF";

    }

}

/* MARK ATTENDANCE */
async function captureAndMark(){

if(!video.videoWidth){

alert("Camera not ready!");
return;

}

canvas.width=video.videoWidth;
canvas.height=video.videoHeight;

canvas.getContext('2d').drawImage(video,0,0);

const photoData=canvas.toDataURL('image/jpeg',0.9);

markBtn.disabled=true;
markBtn.innerHTML="Processing...";

try{

const position=await new Promise((resolve,reject)=>{

navigator.geolocation.getCurrentPosition(resolve,reject);

});

const userLat=position.coords.latitude;
const userLon=position.coords.longitude;

const outdutytext=parseInt($('#outduty').val());


const response = await fetch(apiUrl('/mark-attendance'), {
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
emp_code:empCode.value.trim(),
photo_data:photoData,
lat:userLat,
lon:userLon,
outduty:outdutytext
})
});


const data = await response.json();

if(data.status==="green"){

resultMessage.className="alert alert-success text-center";

resultMessage.innerHTML=`
<div class="result-icon text-success">✔</div>
<h5>${data.message}</h5>
`;

if(empCode.value.trim()){
updateEmployeeInfo(empCode.value.trim());
}

}else{

resultMessage.className="alert alert-danger text-center";

resultMessage.innerHTML=`
<div class="result-icon text-danger">✖</div>
<h5>${data.message}</h5>
`;

speak("Attendance failed");

}

resultMessage.style.display="block";

}catch(error){

resultMessage.className="alert alert-danger text-center";

resultMessage.innerHTML=`
<div class="result-icon text-danger">✖</div>
<h5>Location Permission Denied or Server Error</h5>
`;

resultMessage.style.display="block";

speak("Location permission denied or server error");

}

finally{

markBtn.disabled=false;

markBtn.innerHTML='<i class="fas fa-camera"></i>';

}

}


/* EMPLOYEE INFO */
async function updateEmployeeInfo(code){

try{

const response = await fetch(apiUrl(`/get-employee-info/${code}`));

const data = await response.json();

if(data.success){

document.getElementById('empName').textContent=data.employee.name;

const statusSpan=document.getElementById('empStatus');

if(data.employee.status==='IN'){

statusSpan.className='badge bg-success';
statusSpan.innerText="Working";

speak(`Welcome ${data.employee.name}`);

}else if(data.employee.status==='OUT'){

statusSpan.className='badge bg-danger';
statusSpan.innerText="Left";

speak(`Good Bye ${data.employee.name}`);

}else{

statusSpan.className='badge bg-secondary';
statusSpan.innerText="No Record";

}

document.getElementById('lastAction').textContent=
data.employee.last_action||'-';

document.getElementById('todayHours').textContent=
formatDuration(data.employee.today_minutes||0);

employeeInfo.style.display='block';

}

}catch(error){

console.log(error);

}

}


function formatDuration(minutes){

const hrs=Math.floor(minutes/60);
const mins=minutes%60;

return `${hrs}h ${mins}m`;

}


markBtn.addEventListener('click',captureAndMark);

initCamera();


window.addEventListener('beforeunload',function(){

if(stream){
stream.getTracks().forEach(track=>track.stop());
}

});

</script>

{% endblock %}
