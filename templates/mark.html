{% extends "base.html" %}

{% block content %}
<head>
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js"></script>
</head>
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header bg-white">
                <h4 class="mb-0">
                    <i class="fas fa-check-circle"></i> Mark Attendance
                </h4>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label for="emp_code" class="form-label">
                                <i class="fas fa-id-card"></i> Employee ID
                            </label>
                            <div class="input-group">
                                <input type="text" class="form-control" id="emp_code" name="emp_code" 
                                       placeholder="Enter ID" value="{{ request.args.get('emp_code', '') }}">
                                <button class="btn btn-primary" type="button" id="markBtn">
                                    <i class="fas fa-camera"></i>
                                </button>
                            </div>
                        </div>
                        
                        <!-- Out Duty Toggle -->
                        <div class="form-check form-switch mb-3">
                            <input class="form-check-input" type="checkbox" id="outduty" value="0">
                            <label class="form-check-label" for="outduty">
                                <i class="fas fa-clock"></i> Out Duty
                            </label>
                        </div>
                        
                        <div id="employeeInfo" class="mt-3" style="display: none;">
                            <div class="card bg-light">
                                <div class="card-body">
                                    <h5><i class="fas fa-user"></i> <span id="empName"></span></h5>
                                    <p class="mb-1">
                                        <strong>Status:</strong> 
                                        <span id="empStatus" class="badge-status"></span>
                                    </p>
                                    <p class="mb-1">
                                        <strong>Last:</strong> 
                                        <span id="lastAction"></span>
                                    </p>
                                    <p class="mb-0">
                                        <strong>Today:</strong> 
                                        <span id="todayHours">0h 0m</span>
                                    </p>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="col-md-6">
                        <div class="camera-container">
                            <video id="camera-feed" autoplay playsinline></video>
                            <div class="camera-overlay"></div>
                            <div class="face-guide"></div>
                            <canvas id="photo-canvas" style="display: none;"></canvas>
                        </div>
                        
                        <div id="cameraStatus" class="mt-2 text-center">
                            <span class="badge bg-warning">
                                <i class="fas fa-spinner fa-spin"></i> Initializing...
                            </span>
                        </div>
                        
                        <div class="mt-3">
                            <div id="resultMessage" class="alert text-center" style="display: none;"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const video = document.getElementById('camera-feed');
const canvas = document.getElementById('photo-canvas');
const empCode = document.getElementById('emp_code');
const markBtn = document.getElementById('markBtn');
const cameraStatus = document.getElementById('cameraStatus');
const resultMessage = document.getElementById('resultMessage');
const employeeInfo = document.getElementById('employeeInfo');
const outduty = document.getElementById('outduty');

let stream = null;

async function initCamera() {
    try {
        stream = await navigator.mediaDevices.getUserMedia({
            video: {
                facingMode: 'user',
                width: { ideal: 640 },
                height: { ideal: 480 }
            }
        });
        video.srcObject = stream;
        cameraStatus.innerHTML =
            '<span class="badge bg-success"><i class="fas fa-check"></i> Camera ready</span>';
    } catch (err) {
        cameraStatus.innerHTML =
            '<span class="badge bg-danger"><i class="fas fa-exclamation"></i> Camera not available</span>';
        showToast('Camera access denied', 'error');
    }
}

async function captureAndMark() {
    if (!video.videoWidth) {
        showToast('Camera not ready!', 'warning');
        return;
    }

    if (!empCode.value.trim()) {
        showToast('Please enter Employee ID', 'warning');
        empCode.focus();
        return;
    }

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0);

    const photoData = canvas.toDataURL('image/jpeg', 0.9);

    markBtn.disabled = true;
    markBtn.innerHTML = '<span class="spinner-border spinner-border-sm"></span>';

    try {
        let userLat = 0, userLon = 0;
        
        try {
            const position = await new Promise((resolve, reject) => {
                navigator.geolocation.getCurrentPosition(resolve, reject, {
                    timeout: 5000,
                    enableHighAccuracy: true
                });
            });
            userLat = position.coords.latitude;
            userLon = position.coords.longitude;
        } catch (geoError) {
            console.log('Location not available');
        }

        const response = await fetch(apiUrl('/mark-attendance'), {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                emp_code: empCode.value.trim(),
                photo_data: photoData,
                lat: userLat,
                lon: userLon,
                outduty: outduty.checked ? 1 : 0
            })
        });

        const data = await response.json();

        resultMessage.style.display = 'block';
        
        if (data.status === "green") {
            resultMessage.className = "alert alert-success text-center";
            resultMessage.innerHTML = `
                <div style="font-size:48px;">✅</div>
                <h5>${data.message}</h5>
            `;
            speak('Attendance marked successfully');
            
            if (empCode.value.trim()) {
                updateEmployeeInfo(empCode.value.trim());
            }
        } else {
            resultMessage.className = "alert alert-danger text-center";
            resultMessage.innerHTML = `
                <div style="font-size:48px;">❌</div>
                <h5>${data.message}</h5>
            `;
            speak('Attendance failed');
        }

    } catch (error) {
        resultMessage.className = "alert alert-danger text-center";
        resultMessage.innerHTML = `
            <div style="font-size:48px;">❌</div>
            <h5>Server Error</h5>
        `;
        resultMessage.style.display = "block";
        showToast('Connection error', 'error');
    } finally {
        markBtn.disabled = false;
        markBtn.innerHTML = '<i class="fas fa-camera"></i>';
    }
}

async function updateEmployeeInfo(code) {
    try {
        const response = await fetch(apiUrl(`/get-employee-info/${code}`));
        const data = await response.json();

        if (data.success) {
            document.getElementById('empName').textContent = data.employee.name;

            const statusSpan = document.getElementById('empStatus');
            
            if (data.employee.status === 'IN') {
                statusSpan.className = 'badge bg-success';
                statusSpan.innerText = "Working";
            } else if (data.employee.status === 'OUT') {
                statusSpan.className = 'badge bg-danger';
                statusSpan.innerText = "Left";
            } else {
                statusSpan.className = 'badge bg-secondary';
                statusSpan.innerText = "No Record";
            }

            document.getElementById('lastAction').textContent =
                data.employee.last_action || '-';

            document.getElementById('todayHours').textContent =
                formatDuration(data.employee.today_minutes || 0);

            employeeInfo.style.display = 'block';
        }
    } catch (error) {
        console.log(error);
    }
}

// Event listeners
markBtn.addEventListener('click', captureAndMark);

// Enter key support
empCode.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
        captureAndMark();
    }
});

initCamera();

window.addEventListener('beforeunload', function () {
    if (stream) {
        stream.getTracks().forEach(track => track.stop());
    }
});
</script>
{% endblock %}
