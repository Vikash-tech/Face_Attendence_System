{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8">
    <div class="card shadow">
      <div class="card-header bg-white">
        <h4 class="mb-0">
          <i class="fas fa-user-plus"></i> Employee Registration
        </h4>
      </div>
      <div class="card-body">
        <form id="registerForm">
          <div class="row">
            <!-- LEFT SIDE -->
            <div class="col-md-6">
              <div class="mb-3">
                <label class="form-label">
                  <i class="fas fa-id-card"></i> Employee ID
                </label>
                <input type="text" class="form-control" id="emp_code" name="emp_code" placeholder="Enter employee ID" required>
              </div>
              <div class="mb-3">
                <label class="form-label">
                  <i class="fas fa-user"></i> Full Name
                </label>
                <input type="text" class="form-control" id="name" name="name" placeholder="Enter full name" required>
              </div>
            </div>

            <!-- CAMERA SIDE -->
            <div class="col-md-6 text-center">
              <div class="camera-container position-relative">
                <video id="camera-feed" autoplay playsinline muted class="w-100 border rounded"></video>
                <canvas id="photo-canvas" class="w-100 border rounded" style="display:none;"></canvas>
              </div>
              <div id="cameraStatus" class="mt-2">
                <span class="badge bg-warning">Initializing camera...</span>
              </div>
              <div class="mt-3">
                <button type="button" id="captureBtn" class="btn btn-primary" disabled>
                  <i class="fas fa-camera"></i> Capture Face
                </button>
                <button type="button" id="retakeBtn" class="btn btn-secondary" style="display:none;">
                  <i class="fas fa-redo"></i> Retake
                </button>
              </div>
              <input type="hidden" id="photo_data" name="photo_data">
            </div>
          </div>

          <div class="mt-4">
            <button type="submit" id="submitBtn" class="btn btn-success w-100" disabled>
              <i class="fas fa-save"></i> Register Employee
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<!-- SCRIPT -->
<script>
const video = document.getElementById("camera-feed");
const canvas = document.getElementById("photo-canvas");
const captureBtn = document.getElementById("captureBtn");
const retakeBtn = document.getElementById("retakeBtn");
const submitBtn = document.getElementById("submitBtn");
const photoInput = document.getElementById("photo_data");
const cameraStatus = document.getElementById("cameraStatus");
let stream = null;

/* INIT CAMERA */
async function initCamera() {
    try {
        stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
        video.srcObject = stream;
        video.onloadedmetadata = () => {
            video.play();
            captureBtn.disabled = false;
            cameraStatus.innerHTML = '<span class="badge bg-success">Camera Ready</span>';
        };
    } catch (err) {
        cameraStatus.innerHTML = '<span class="badge bg-danger">Camera Not Available</span>';
    }
}

/* CAPTURE PHOTO */
function capturePhoto() {
    const ctx = canvas.getContext("2d");
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    const photoData = canvas.toDataURL("image/jpeg", 0.9);
    photoInput.value = photoData;
    video.style.display = "none";
    canvas.style.display = "block";
    captureBtn.style.display = "none";
    retakeBtn.style.display = "inline-block";
    submitBtn.disabled = false;
    cameraStatus.innerHTML = '<span class="badge bg-success">Face Captured</span>';
    if (stream) stream.getTracks().forEach(track => track.stop());
}

/* RETAKE PHOTO */
function retakePhoto() {
    photoInput.value = "";
    canvas.style.display = "none";
    video.style.display = "block";
    captureBtn.style.display = "inline-block";
    retakeBtn.style.display = "none";
    submitBtn.disabled = true;
    initCamera();
}

/* SPEAK FUNCTION */
function speak(message) {
    if ('speechSynthesis' in window) {
        const utterance = new SpeechSynthesisUtterance(message);
        utterance.lang = 'en-US';
        window.speechSynthesis.speak(utterance);
    }
}

/* SHOW TOAST */
function showToast(message, type = "success") {
    const toastEl = document.createElement("div");
    toastEl.className = `toast align-items-center text-white bg-${type} border-0 position-fixed bottom-0 end-0 m-3`;
    toastEl.setAttribute("role", "alert");
    toastEl.innerHTML = `
        <div class="d-flex">
            <div class="toast-body">${message}</div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    `;
    document.body.appendChild(toastEl);
    const toast = new bootstrap.Toast(toastEl, { delay: 2000 });
    toast.show();
    toastEl.addEventListener("hidden.bs.toast", () => toastEl.remove());
}

/* REGISTER EMPLOYEE */
document.getElementById("registerForm").addEventListener("submit", function(e) {
    e.preventDefault();

    if (!photoInput.value) {
        alert("Please capture photo");
        return;
    }

    submitBtn.disabled = true;
    submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Registering...';

    const formData = new URLSearchParams();
    formData.append("emp_code", document.getElementById("emp_code").value.trim());
    formData.append("name", document.getElementById("name").value.trim());
    formData.append("photo_data", photoInput.value);

    fetch(apiUrl("/register"), {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: formData.toString()
    })
    .then(res => res.json())
    .then(data => {
        if (data.success) {
            showToast("Employee Registered Successfully", "success");
            speak("Registration completed"); // Speak message
            setTimeout(() => { window.location.href = "/mark"; }, 2000);
        } else {
            alert(data.message || "Registration failed");
            submitBtn.disabled = false;
            submitBtn.innerHTML = '<i class="fas fa-save"></i> Register Employee';
        }
    })
    .catch(err => {
        alert("Registration failed");
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<i class="fas fa-save"></i> Register Employee';
    });
});

captureBtn.addEventListener("click", capturePhoto);
retakeBtn.addEventListener("click", retakePhoto);

/* START CAMERA */
initCamera();

window.addEventListener("beforeunload", function() {
    if (stream) stream.getTracks().forEach(track => track.stop());
});
</script>
{% endblock %}
