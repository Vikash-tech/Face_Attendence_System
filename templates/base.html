<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Face Attendance System</title>

<!-- Bootstrap 5 -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Font Awesome -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<!-- DataTables -->
<link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

<!-- Custom CSS -->
<link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">

<!-- PWA Manifest -->
<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#2563EB">
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-light bg-light fixed-top shadow-sm">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="/">
            <i class="fas fa-camera-retro"></i>
            <span class="d-none d-sm-inline">Face Attendance</span>
            <span class="d-inline d-sm-none">FAS</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/"><i class="fas fa-home"></i> Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="/register"><i class="fas fa-user-plus"></i> Register</a></li>
                <li class="nav-item"><a class="nav-link" href="/mark"><i class="fas fa-check-circle"></i> Mark</a></li>
                <li class="nav-item"><a class="nav-link" href="/update-employee-photo/"><i class="fas fa-edit"></i> Update</a></li>
                <li class="nav-item"><a class="nav-link" href="/report"><i class="fas fa-chart-bar"></i> Report</a></li>
                <li class="nav-item"><a class="nav-link" href="/essl-report"><i class="fas fa-chart-bar"></i> Essl Report</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- Mobile Bottom Navigation -->
<div class="bottom-nav d-lg-none">
    <a href="/" class="bottom-nav-item"><i class="fas fa-home"></i><span>Home</span></a>
    <a href="/register" class="bottom-nav-item"><i class="fas fa-user-plus"></i><span>Register</span></a>
    <a href="/mark" class="bottom-nav-item" style="color:blue"><i class="fas fa-check-circle"></i><span>Mark</span></a>
    <a href="/update-employee-photo" class="bottom-nav-item"><i class="fas fa-edit"></i><span>Update</span></a>
    <a href="/report" class="bottom-nav-item"><i class="fas fa-chart-bar"></i><span>Report</span></a>
</div>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<!-- Main Content -->
<div class="container-fluid main-content">
    {% if api_unavailable %}
        <div class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="fas fa-exclamation-triangle"></i> API connection failed: {{ api_error }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
    {% endif %}
    {% block content %}{% endblock %}
</div>


<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>

<!-- Common JS -->
<script src="{{ url_for('static', filename='js/common.js') }}"></script>

<!-- API & Toast Functions -->
<script>
window.API_BASE_URL = "{{ api_base_url }}";

function apiUrl(path){
    if(!window.API_BASE_URL) return path;
    return `${window.API_BASE_URL}${path}`;
}

/* Toast Message */
function showToast(message,type="success"){
    const container=document.getElementById("toastContainer");
    const toast=document.createElement("div");
    toast.className=`toast toast-${type}`;
    toast.innerHTML=`
        <div class="d-flex align-items-center">
            <i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-exclamation-triangle'} me-2"></i>
            <div>${message}</div>
        </div>`;
    container.appendChild(toast);
    setTimeout(()=>{
        toast.style.animation = 'slideIn 0.3s ease reverse';
        setTimeout(()=>toast.remove(),300);
    },5000);
}

/* Check API on Load */
window.addEventListener("load", async function(){
    try{
        const res=await fetch(apiUrl("/"),{method:"GET"});
        if(!res.ok){
            showToast("API is not reachable","error");
        }
    }catch(e){
        showToast("API is not reachable","error");
    }
});

/* Pull To Refresh */
let touchstartY=0;
document.addEventListener("touchstart", e=>{ touchstartY=e.touches[0].screenY; }, {passive:true});
document.addEventListener("touchmove", e=>{
    const touchY=e.touches[0].screenY;
    const diff=touchY-touchstartY;
    if(diff>100 && window.scrollY===0){
        document.querySelector(".ptr-indicator").classList.add("visible");
    }
},{passive:true});
document.addEventListener("touchend", e=>{
    if(document.querySelector(".ptr-indicator").classList.contains("visible")){
        location.reload();
    }
});

/* Register Service Worker */
if('serviceWorker' in navigator){
    navigator.serviceWorker.register("{{ url_for('static', filename='service-worker.js') }}")
    .then(()=>console.log("Service Worker Registered"));
}
</script>

</body>
</html>
