<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Face Attendance System</title>
    <!-- Bootstrap 5 with dark mode support -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    
    <!-- jQuery & DataTables -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    
    <!-- PWA Support -->
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#2563EB">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
</head>
<body>
    <!-- Mobile Navigation -->
    <nav class="navbar navbar-expand-lg bg-body-tertiary fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <i class="fas fa-camera-retro"></i> 
                <span class="d-none d-sm-inline">Face Attendance</span>
                <span class="d-inline d-sm-none">FAS</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/">
                            <i class="fas fa-home"></i> 
                            <span class="d-none d-lg-inline">Dashboard</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/register">
                            <i class="fas fa-user-plus"></i> 
                            <span class="d-none d-lg-inline">Register</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/mark">
                            <i class="fas fa-check-circle"></i> 
                            <span class="d-none d-lg-inline">Mark</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/update-employee-photo/">
                            <i class="fas fa-edit"></i> 
                            <span class="d-none d-lg-inline">Update</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/report">
                            <i class="fas fa-chart-bar"></i> 
                            <span class="d-none d-lg-inline">Report</span>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Mobile Bottom Navigation (visible on small screens) -->
    <div class="bottom-nav d-lg-none">
        <a href="/" class="bottom-nav-item">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </a>
        <a href="/register" class="bottom-nav-item">
            <i class="fas fa-user-plus"></i>
            <span>Register</span>
        </a>
        <a href="/mark" class="bottom-nav-item">
            <i class="fas fa-check-circle"></i>
            <span>Mark</span>
        </a>
        <a href="/report" class="bottom-nav-item">
            <i class="fas fa-chart-bar"></i>
            <span>Report</span>
        </a>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Main Content -->
    <div class="container-fluid main-content">
        {% if api_unavailable %}
        <div class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="fas fa-exclamation-triangle"></i> 
            API connection failed: {{ api_error }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endif %}
        {% block content %}{% endblock %}
    </div>

    <!-- Pull-to-refresh indicator -->
    <div class="ptr-indicator">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>

    <script>
        window.API_BASE_URL = "{{ api_base_url }}";
        
        function apiUrl(path) {
            if (!window.API_BASE_URL) return path;
            return `${window.API_BASE_URL}${path}`;
        }

        // Check API connection
        window.addEventListener('load', async function () {
            try {
                const res = await fetch(apiUrl('/'), { method: 'GET' });
                if (!res.ok) {
                    showToast('API is not reachable', 'error');
                }
            } catch (e) {
                showToast('API is not reachable', 'error');
            }
        });

        // Pull to refresh for mobile
        let touchstartY = 0;
        document.addEventListener('touchstart', e => {
            touchstartY = e.touches[0].screenY;
        }, { passive: true });

        document.addEventListener('touchmove', e => {
            const touchY = e.touches[0].screenY;
            const touchDiff = touchY - touchstartY;
            
            if (touchDiff > 100 && window.scrollY === 0) {
                document.querySelector('.ptr-indicator').classList.add('visible');
            }
        }, { passive: true });

        document.addEventListener('touchend', e => {
            if (document.querySelector('.ptr-indicator').classList.contains('visible')) {
                window.location.reload();
            }
        });
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/common.js') }}"></script>
</body>
</html>
